<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>莊友佛手茶 | 運算思維液態玻璃引擎</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;700&family=Noto+Sans+TC:wght@300;400;500;700&family=Noto+Serif+TC:wght@500;700&display=swap" rel="stylesheet">
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        tea: { dark: '#12261A', light: '#EAF3EC', gold: '#D4AF37', amber: '#C5832B' }
                    },
                    fontFamily: {
                        sans: ['Noto Sans TC', 'sans-serif'],
                        serif: ['Noto Serif TC', 'serif'],
                        mono: ['Fira Code', 'monospace']
                    }
                }
            }
        }
    </script>
    <style>
        /* 佛手茶底色：動態流體漸層背景 */
        body, html {
            margin: 0; padding: 0; min-height: 100vh;
            font-family: 'Noto Sans TC', sans-serif;
            background: linear-gradient(-45deg, #0A140E, #1C3A27, #664d14, #12261A);
            background-size: 400% 400%;
            animation: fluidBackground 15s ease infinite;
            color: #FFFFFF;
            overflow-x: hidden;
        }

        @keyframes fluidBackground {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* 🍎 iOS 26 Liquid Glass (液態毛玻璃特效) */
        .liquid-glass {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(24px) saturate(150%);
            -webkit-backdrop-filter: blur(24px) saturate(150%);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 10px 40px -10px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.3);
        }

        .liquid-glass-dark {
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(20px) saturate(120%);
            -webkit-backdrop-filter: blur(20px) saturate(120%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.1);
        }

        /* 節點進場動畫 */
        @keyframes popInGlass {
            0% { opacity: 0; transform: translateY(30px) scale(0.9); filter: blur(10px); }
            100% { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
        }
        .node-reveal { animation: popInGlass 0.7s cubic-bezier(0.16, 1, 0.3, 1) forwards; }

        /* 管線發光連接線 */
        .wire-vertical {
            width: 3px;
            background: linear-gradient(to bottom, rgba(212,175,55,1) 0%, rgba(255,255,255,0) 100%);
            background-size: 100% 200%;
            animation: flowDown 1.5s infinite linear;
            box-shadow: 0 0 10px rgba(212,175,55,0.5);
        }
        @keyframes flowDown { 0% { background-position: 0% -100%; } 100% { background-position: 0% 100%; } }

        /* 蒸汽上升動畫 */
        @keyframes steam-rise {
            0% { opacity: 0; transform: translateY(5px) scale(0.8); }
            50% { opacity: 0.8; transform: translateY(-10px) scale(1.1); }
            100% { opacity: 0; transform: translateY(-20px) scale(1.2); }
        }
        .animate-steam { animation: steam-rise 2s infinite ease-in-out; }

        /* 隱藏原生 Range，打造玻璃流體滑桿 */
        input[type=range] { -webkit-appearance: none; width: 100%; background: transparent; }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none; height: 24px; width: 24px; border-radius: 50%;
            background: rgba(255, 255, 255, 0.9); cursor: pointer; margin-top: -10px;
            box-shadow: 0 0 15px rgba(255,255,255,0.8);
            border: 2px solid rgba(255,255,255,0.5);
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%; height: 0px; cursor: pointer; background: transparent;
        }

        .btn-bounce:active { transform: scale(0.94); transition: transform 0.1s ease; }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.3); border-radius: 10px; }
    </style>
</head>
<body class="antialiased min-h-screen flex flex-col relative">

    <!-- 頂部資訊列：極窄邊框液態玻璃 -->
    <header class="fixed top-0 w-full z-50 liquid-glass border-b border-white/20 px-6 py-3 flex justify-between items-center">
        <div class="flex items-center gap-3">
            <div class="w-8 h-8 rounded-full bg-gradient-to-tr from-tea-gold to-yellow-200 text-tea-dark flex items-center justify-center font-serif font-bold text-sm shadow-[0_0_15px_rgba(212,175,55,0.5)]">莊</div>
            <div>
                <h1 class="font-bold tracking-widest text-sm text-white drop-shadow-md">莊友佛手茶</h1>
                <p class="text-[9px] font-mono text-white/60">iOS 26 Liquid Glass Engine</p>
            </div>
        </div>
        <div class="flex items-center gap-4">
            <div class="hidden sm:flex text-[10px] font-mono text-white/80 liquid-glass-dark px-3 py-1.5 rounded-full items-center gap-2">
                <span class="w-1.5 h-1.5 rounded-full bg-emerald-400 animate-pulse shadow-[0_0_8px_#34d399]"></span>
                CT_PIPELINE: ONLINE
            </div>
            <button onclick="toggleCart()" class="relative p-2 text-white hover:text-tea-gold transition-colors btn-bounce">
                <i class="fa-solid fa-bag-shopping text-xl drop-shadow-md"></i>
                <span id="cart-count" class="absolute top-0 right-0 bg-red-500 text-white text-[10px] font-bold w-4 h-4 rounded-full flex items-center justify-center shadow-lg hidden">0</span>
            </button>
        </div>
    </header>

    <!-- 主畫布區 -->
    <main class="flex-1 pt-28 pb-12 px-4 max-w-4xl mx-auto w-full relative z-10 flex flex-col items-center">
        
        <!-- 核心輸入器 (液態玻璃卡片) -->
        <div class="w-full liquid-glass rounded-[2rem] p-6 sm:p-10 relative z-20 space-y-6">
            <div class="text-center space-y-2">
                <div class="inline-flex items-center justify-center w-14 h-14 rounded-full liquid-glass-dark mb-2 border border-white/20 shadow-[0_0_20px_rgba(255,255,255,0.1)]">
                    <i class="fa-solid fa-droplet text-2xl text-tea-gold"></i>
                </div>
                <h2 class="font-serif text-2xl sm:text-3xl font-bold text-white drop-shadow-lg">定義您的身心問題</h2>
                <p class="text-xs text-white/60 font-light max-w-lg mx-auto leading-relaxed">
                    請輸入日常抱怨，並滑動液態管量化生理變數。運算思維引擎將為您萃取出專屬的佛手茶解法。
                </p>
            </div>
            
            <div class="max-w-2xl mx-auto grid grid-cols-1 md:grid-cols-2 gap-6">
                <!-- 左側：自由文本輸入 -->
                <div class="space-y-2 flex flex-col">
                    <label class="text-xs font-bold text-white/90 font-mono tracking-wider"><i class="fa-solid fa-keyboard text-tea-gold mr-1"></i>TEXT INPUT</label>
                    <textarea id="complaint-input" rows="5" class="w-full liquid-glass-dark text-white rounded-2xl p-4 text-sm focus:border-tea-gold outline-none transition-all resize-none shadow-inner flex-1 placeholder:text-white/30" placeholder="[必填] 請輸入您的抱怨文字...&#10;例如：熬夜寫程式大腦卡住快瘋了 / 剛吃完烤肉大餐胃脹脹的..."></textarea>
                </div>

                <!-- 右側：完全還原標題的液態生化變數管 -->
                <div class="space-y-5 liquid-glass-dark p-5 rounded-2xl flex flex-col justify-center border-t border-white/10">
                    <label class="text-xs font-bold text-white/90 font-mono tracking-wider"><i class="fa-solid fa-chart-line text-tea-gold mr-1"></i>VARIABLES (生理變數擷取)</label>
                    
                    <!-- 液態管 1 -->
                    <div class="space-y-1.5 relative">
                        <div class="flex justify-between text-[11px] text-white/80 font-bold mb-1 drop-shadow-sm">
                            <span>🧠 腦霧卡關度 (Cognitive Load)</span>
                        </div>
                        <!-- 玻璃試管外殼 -->
                        <div class="relative w-full h-8 bg-black/40 rounded-full shadow-[inset_0_3px_10px_rgba(0,0,0,0.8)] overflow-hidden border border-white/10">
                            <!-- 發光流體填充 -->
                            <div id="fill-cog" class="absolute top-0 left-0 h-full bg-gradient-to-r from-pink-500 to-rose-400 transition-all duration-100 pointer-events-none shadow-[0_0_15px_#fb7185]" style="width: 32%;"></div>
                            <input type="range" id="slider-cog" min="0" max="100" value="32" class="absolute top-0 left-0 w-full h-full opacity-0 cursor-pointer z-10" oninput="updateFluidSlider('cog', this.value)">
                            <div class="absolute inset-y-0 right-4 flex items-center pointer-events-none z-20">
                                <span id="val-cog" class="font-mono font-bold text-xs text-white mix-blend-overlay">32%</span>
                            </div>
                        </div>
                    </div>

                    <!-- 液態管 2 -->
                    <div class="space-y-1.5 relative">
                        <div class="flex justify-between text-[11px] text-white/80 font-bold mb-1 drop-shadow-sm">
                            <span>🌙 情緒緊繃度 (Stress Level)</span>
                        </div>
                        <div class="relative w-full h-8 bg-black/40 rounded-full shadow-[inset_0_3px_10px_rgba(0,0,0,0.8)] overflow-hidden border border-white/10">
                            <div id="fill-stress" class="absolute top-0 left-0 h-full bg-gradient-to-r from-amber-600 to-yellow-500 transition-all duration-100 pointer-events-none shadow-[0_0_15px_#fbbf24]" style="width: 72%;"></div>
                            <input type="range" id="slider-stress" min="0" max="100" value="72" class="absolute top-0 left-0 w-full h-full opacity-0 cursor-pointer z-10" oninput="updateFluidSlider('stress', this.value)">
                            <div class="absolute inset-y-0 right-4 flex items-center pointer-events-none z-20">
                                <span id="val-stress" class="font-mono font-bold text-xs text-white mix-blend-overlay">72%</span>
                            </div>
                        </div>
                    </div>

                    <!-- 液態管 3 -->
                    <div class="space-y-1.5 relative">
                        <div class="flex justify-between text-[11px] text-white/80 font-bold mb-1 drop-shadow-sm">
                            <span>🥑 腸胃油膩度 (Lipid Burden)</span>
                        </div>
                        <div class="relative w-full h-8 bg-black/40 rounded-full shadow-[inset_0_3px_10px_rgba(0,0,0,0.8)] overflow-hidden border border-white/10">
                            <div id="fill-lipid" class="absolute top-0 left-0 h-full bg-gradient-to-r from-blue-600 to-cyan-500 transition-all duration-100 pointer-events-none shadow-[0_0_15px_#22d3ee]" style="width: 18%;"></div>
                            <input type="range" id="slider-lipid" min="0" max="100" value="18" class="absolute top-0 left-0 w-full h-full opacity-0 cursor-pointer z-10" oninput="updateFluidSlider('lipid', this.value)">
                            <div class="absolute inset-y-0 right-4 flex items-center pointer-events-none z-20">
                                <span id="val-lipid" class="font-mono font-bold text-xs text-white mix-blend-overlay">18%</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="text-center pt-4">
                <button onclick="startPipeline()" id="btn-start" class="bg-gradient-to-r from-tea-gold to-yellow-600 text-tea-dark font-bold text-sm px-8 py-3.5 rounded-full shadow-[0_0_20px_rgba(212,175,55,0.4)] transition-transform active:scale-95 inline-flex items-center gap-2 border border-white/50">
                    <i class="fa-solid fa-play"></i> 執行運算思維管線
                </button>
            </div>
        </div>

        <!-- 動態生成的視覺化管線區 -->
        <div id="pipeline-container" class="w-full mt-2 flex flex-col items-center pb-32"></div>

    </main>

    <!-- 重新整理按鈕 -->
    <button onclick="location.reload()" class="fixed bottom-6 right-6 w-12 h-12 liquid-glass rounded-full shadow-xl text-white/60 hover:text-white flex items-center justify-center transition-all active:scale-90 z-40 border border-white/20">
        <i class="fa-solid fa-rotate-right"></i>
    </button>

    <!-- 購物車抽屜 (玻璃質感) -->
    <div id="cart-drawer" class="fixed inset-0 z-50 overflow-hidden pointer-events-none transition-all duration-400 translate-x-full">
        <div class="absolute inset-0 bg-black/60 backdrop-blur-sm opacity-0 transition-opacity duration-300" onclick="toggleCart()" id="cart-overlay"></div>
        <div class="absolute inset-y-0 right-0 max-w-sm w-full liquid-glass shadow-2xl flex flex-col justify-between pointer-events-auto border-l border-white/20">
            <div class="p-6 border-b border-white/10 flex justify-between items-center liquid-glass-dark">
                <h3 class="text-md font-bold text-tea-gold flex items-center gap-2">
                    <i class="fa-solid fa-bag-shopping"></i><span>採購物資庫</span>
                </h3>
                <button onclick="toggleCart()" class="text-white/60 hover:text-white transition-colors active:scale-90">
                    <i class="fa-solid fa-xmark text-xl"></i>
                </button>
            </div>
            <div id="cart-items" class="flex-1 overflow-y-auto p-6 space-y-3">
                <div class="text-center py-12 text-white/40 text-xs">
                    目前沒有處方解法。請先執行運算思維管線！
                </div>
            </div>
            <div class="p-6 border-t border-white/10 liquid-glass-dark space-y-4">
                <div class="flex justify-between items-end">
                    <span class="text-xs font-bold text-white/60">應付總額 (滿$499免運)</span>
                    <span id="total-price" class="text-xl font-mono font-extrabold text-tea-gold">NT$ 0</span>
                </div>
                <button onclick="checkout()" class="w-full bg-tea-gold text-tea-dark hover:bg-yellow-400 font-bold py-3.5 rounded-xl shadow-[0_0_15px_rgba(212,175,55,0.3)] transition-transform active:scale-95 text-sm flex items-center justify-center gap-2">
                    <i class="fa-solid fa-credit-card"></i> 結帳採購
                </button>
            </div>
        </div>
    </div>

    <!-- Toast 提示訊息 -->
    <div id="toast" class="fixed bottom-6 left-1/2 -translate-x-1/2 z-50 liquid-glass border border-white/20 text-white py-3 px-6 rounded-full text-xs font-medium shadow-2xl transition-all duration-300 transform translate-y-20 opacity-0 pointer-events-none flex items-center gap-2">
        <i class="fa-solid fa-circle-check text-tea-gold"></i>
        <span id="toast-msg">加入成功！</span>
    </div>

    <script>
        let cart = [];
        let currentTeaType = "";

        // 更新流體滑桿 UI
        function updateFluidSlider(id, val) {
            document.getElementById(`val-${id}`).innerText = val + '%';
            document.getElementById(`fill-${id}`).style.width = val + '%';
        }

        // 啟動運算管線
        function startPipeline() {
            const inputTxt = document.getElementById('complaint-input').value.trim().toLowerCase();
            const valCog = parseInt(document.getElementById('slider-cog').value);
            const valStress = parseInt(document.getElementById('slider-stress').value);
            const valLipid = parseInt(document.getElementById('slider-lipid').value);

            // ⚠️【強制驗證】：如果沒輸入文字，擋下並提示！
            if (!inputTxt) {
                alert("【系統提示】請先在左側輸入文字描述您的抱怨（例如：熬夜好累、肚子好脹），系統才能進行 NLP 語意特徵擷取！");
                // 讓輸入框閃爍提示
                const inputBox = document.getElementById('complaint-input');
                inputBox.classList.add('ring-2', 'ring-red-500');
                setTimeout(() => inputBox.classList.remove('ring-2', 'ring-red-500'), 1500);
                inputBox.focus();
                return;
            }

            const container = document.getElementById('pipeline-container');
            container.innerHTML = '';
            document.getElementById('btn-start').innerHTML = '<i class="fa-solid fa-spinner animate-spin"></i> 運算中...';
            document.getElementById('btn-start').classList.add('opacity-70', 'cursor-not-allowed');

            // 綜合文字與滑桿權重
            let scoreCog = valCog + (inputTxt.includes('code') || inputTxt.includes('昏') || inputTxt.includes('累') || inputTxt.includes('熬夜') || inputTxt.includes('卡') ? 50 : 0);
            let scoreStress = valStress + (inputTxt.includes('壓力') || inputTxt.includes('焦慮') || inputTxt.includes('緊繃') || inputTxt.includes('煩') ? 50 : 0);
            let scoreLipid = valLipid + (inputTxt.includes('油') || inputTxt.includes('脹') || inputTxt.includes('飽') || inputTxt.includes('大餐') || inputTxt.includes('烤肉') ? 50 : 0);

            let decompKw = `[腦霧:${valCog}%, 緊繃:${valStress}%, 油膩:${valLipid}%]`;
            let patMatch, absFilter, algoTitle, algoDesc, price;
            
            // 模式識別
            if (scoreStress >= scoreLipid && scoreStress >= scoreCog) {
                currentTeaType = "red";
                patMatch = "匹配目標：需「疏肝理氣」➜ 佛手茶特有高含量黃酮類化合物";
                absFilter = "濾除環境雜訊 ➜ 提取「舒壓解鬱、平復神經」核心解法";
                algoTitle = "莊友頂級佛手紅茶包 (20入)";
                algoDesc = "佛手茶自古以「理氣解鬱」聞名。採用全發酵製程轉化出優雅的柑橘熟果蜜香，內含的高含量黃酮類能有效疏解肝氣鬱結，撫平緊繃情緒。";
                price = 280;
            } else if (scoreLipid >= scoreStress && scoreLipid >= scoreCog) {
                currentTeaType = "dark";
                patMatch = "匹配目標：需「和胃止痛」➜ 黑茶多酚與佛手揮發油成分";
                absFilter = "濾除食物種類雜訊 ➜ 提取「消食化膩、解除脹滿」核心解法";
                algoTitle = "莊友陳年炭焙佛手黑茶包 (20入)";
                algoDesc = "結合老手藝深層炭焙與後發酵，茶湯濃厚甘甜。其豐富的黑茶多酚能加速分解脂肪，是吃完大餐後消除脹滿的最強處方！";
                price = 300;
            } else {
                currentTeaType = "green";
                patMatch = "匹配目標：需「提神益思」➜ 香櫞青茶未發酵之天然兒茶素";
                absFilter = "濾除外在事件雜訊 ➜ 提取「驅散昏沉、激發大腦」核心解法";
                algoTitle = "莊友經典佛手青茶包 (20入)";
                algoDesc = "輕發酵製程完整鎖住竹山佛手茶特有的優雅雪梨蘭花清香。保留了最高活性的茶多酚，能以最溫和的方式驅散大腦當機，助您重回高效心流。";
                price = 250;
            }

            const nodes = [
                {
                    step: "STEP 1: DECOMPOSITION", icon: "fa-solid fa-layer-group text-blue-400", title: "量化身心抱怨矩陣",
                    content: `<div class="liquid-glass-dark font-mono text-xs p-3 rounded-xl border border-blue-400/30 mt-3 text-white/80 shadow-inner">提取量化變數向量：<br><span class="text-blue-300 font-bold tracking-widest mt-1 block">${decompKw}</span></div>`
                },
                {
                    step: "STEP 2: PATTERN RECOGNITION", icon: "fa-solid fa-fingerprint text-purple-400", title: "比對真實佛手茶生化庫",
                    content: `<div class="liquid-glass-dark font-mono text-xs p-3 rounded-xl border border-purple-400/30 mt-3 text-white/80 shadow-inner"><span class="text-purple-300 font-bold">${patMatch}</span></div>`
                },
                {
                    step: "STEP 3: ABSTRACTION", icon: "fa-solid fa-filter text-orange-400", title: "排除無關環境雜訊",
                    content: `<div class="liquid-glass-dark font-mono text-xs p-3 rounded-xl border border-orange-400/30 mt-3 text-white/80 shadow-inner"><span class="text-orange-300 font-bold">${absFilter}</span></div>`
                },
                {
                    step: "STEP 4: ALGORITHM", icon: "fa-solid fa-check-double text-emerald-400", title: "莊友佛手茶最佳解法",
                    content: `
                        <div class="mt-5 liquid-glass-dark rounded-2xl shadow-2xl overflow-hidden text-left relative z-20 border border-white/20">
                            <!-- 互動分頁標籤 -->
                            <div class="flex border-b border-white/10 bg-black/40 font-mono text-[10px] sm:text-xs">
                                <button onclick="switchTab('result')" id="tab-result" class="flex-1 py-3 font-bold text-tea-gold border-b-2 border-tea-gold transition-colors bg-white/5"><i class="fa-solid fa-box-open mr-1"></i>處方結論</button>
                                <button onclick="switchTab('sim')" id="tab-sim" class="flex-1 py-3 text-white/40 hover:text-white border-b-2 border-transparent transition-colors"><i class="fa-solid fa-flask text-xs mr-1"></i>沖泡演算法模擬</button>
                            </div>
                            
                            <!-- 分頁 1：處方結論 -->
                            <div id="content-result" class="p-6 bg-gradient-to-br from-white/5 to-transparent">
                                <span class="text-[9px] font-mono bg-tea-gold text-tea-dark font-bold px-2 py-1 rounded shadow-[0_0_10px_rgba(212,175,55,0.3)]">Optimal Choice</span>
                                <h3 class="font-serif font-bold text-xl mt-3 text-white drop-shadow-md">${algoTitle}</h3>
                                <p class="text-xs text-white/70 mt-2 leading-relaxed">${algoDesc}</p>
                                <div class="mt-5 flex justify-between items-center border-t border-white/10 pt-4">
                                    <span class="font-mono font-bold text-lg text-tea-gold drop-shadow-[0_0_5px_rgba(212,175,55,0.5)]">NT$ ${price}</span>
                                    <button class="bg-white/10 border border-white/20 text-white text-xs font-bold px-4 py-2.5 rounded-xl shadow-lg hover:bg-white/20 transition-all active:scale-95 flex items-center gap-1.5 backdrop-blur-md" onclick="addToCart('${algoTitle}', ${price})">
                                        <i class="fa-solid fa-cart-plus"></i> 一鍵採購
                                    </button>
                                </div>
                            </div>

                            <!-- 分頁 2：沖泡演算法模擬器 -->
                            <div id="content-sim" class="hidden p-6 bg-black/60 text-white font-mono text-xs shadow-inner">
                                <p class="text-emerald-400 mb-3"><i class="fa-solid fa-terminal mr-1"></i>執行佛手茶萃取演算法</p>
                                <div class="space-y-2 text-[10px] text-white/50">
                                    <p>1. 初始化參數: <span class="text-tea-gold">Temp = 90°C</span>, <span class="text-blue-400">Water = 300ml</span></p>
                                    <p>2. 載入物件: <span class="text-white">莊友立體原葉茶包</span></p>
                                </div>
                                <div class="mt-5 space-y-2">
                                    <div class="flex justify-between text-[10px] text-white/70">
                                        <span id="sim-status">等待指令...</span>
                                        <span id="sim-pct" class="font-bold text-emerald-400">0%</span>
                                    </div>
                                    <div class="w-full bg-black/50 h-2.5 rounded-full overflow-hidden border border-white/10 shadow-inner">
                                        <div id="sim-bar" class="bg-gradient-to-r from-emerald-600 to-emerald-400 h-full w-0 transition-all duration-100 shadow-[0_0_10px_#34d399]"></div>
                                    </div>
                                </div>
                                <button onclick="runSimulation()" id="btn-sim" class="w-full mt-5 bg-emerald-500/20 hover:bg-emerald-500/40 border border-emerald-500/50 text-emerald-300 font-bold py-2.5 rounded-xl text-[10px] uppercase tracking-widest active:scale-95 transition-all shadow-[0_0_15px_rgba(16,185,129,0.2)]">
                                    <i class="fa-solid fa-play mr-1"></i> RUN_EXTRACTION()
                                </button>

                                <!-- 演算法產出實體化 -->
                                <div id="sim-result-area" class="hidden mt-5 liquid-glass-dark border-emerald-500/40 rounded-2xl p-5 text-center">
                                    <div class="relative inline-block mt-2">
                                        <div class="absolute -top-6 left-1/2 -translate-x-1/2 text-white/40 text-3xl animate-steam">♨️</div>
                                        <div class="text-5xl drop-shadow-[0_0_20px_rgba(212,175,55,0.6)]">🍵</div>
                                    </div>
                                    <h4 class="text-tea-gold font-bold mt-4 text-sm tracking-widest drop-shadow-md">數位茶湯萃取完成</h4>
                                    <div class="grid grid-cols-2 gap-3 mt-4 text-[9px] text-white/60">
                                        <div class="bg-black/40 p-2.5 rounded-xl border border-white/5 shadow-inner">有效生化萃取率: <span class="text-emerald-400 font-bold text-xs block mt-1">98.5%</span></div>
                                        <div class="bg-black/40 p-2.5 rounded-xl border border-white/5 shadow-inner">多酚黃酮活性: <span class="text-emerald-400 font-bold text-xs block mt-1">OPTIMAL</span></div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    `
                }
            ];

            // 動態節點生成
            nodes.forEach((node, index) => {
                setTimeout(() => {
                    if (index > 0) {
                        const wire = document.createElement('div');
                        wire.className = "h-8 sm:h-12 flex justify-center node-reveal";
                        wire.innerHTML = `<div class="wire-vertical"></div>`;
                        container.appendChild(wire);
                    }

                    const card = document.createElement('div');
                    card.className = "w-full max-w-xl liquid-glass rounded-3xl p-6 text-center node-reveal border-t border-l border-white/30 relative z-10";
                    card.innerHTML = `
                        <div class="text-[10px] font-mono font-bold text-white/50 tracking-widest uppercase mb-1 drop-shadow-sm">${node.step}</div>
                        <div class="flex items-center justify-center gap-2 mb-2">
                            <i class="${node.icon} text-lg drop-shadow-md"></i>
                            <h3 class="font-bold text-white text-base drop-shadow-md">${node.title}</h3>
                        </div>
                        ${node.content}
                    `;
                    container.appendChild(card);
                    window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });

                    if (index === 3) {
                        const startBtn = document.getElementById('btn-start');
                        startBtn.innerHTML = '<i class="fa-solid fa-rotate-right"></i> 重新執行管線';
                        startBtn.classList.remove('opacity-70', 'cursor-not-allowed');
                    }
                }, index * 1000); 
            });
        }

        // 分頁切換
        function switchTab(tabName) {
            const tabRes = document.getElementById('tab-result');
            const tabSim = document.getElementById('tab-sim');
            const conRes = document.getElementById('content-result');
            const conSim = document.getElementById('content-sim');

            if (tabName === 'result') {
                tabRes.className = "flex-1 py-3 font-bold text-tea-gold border-b-2 border-tea-gold transition-colors bg-white/5";
                tabSim.className = "flex-1 py-3 text-white/40 hover:text-white border-b-2 border-transparent transition-colors";
                conRes.classList.remove('hidden');
                conSim.classList.add('hidden');
            } else {
                tabSim.className = "flex-1 py-3 font-bold text-tea-gold border-b-2 border-tea-gold transition-colors bg-white/5";
                tabRes.className = "flex-1 py-3 text-white/40 hover:text-white border-b-2 border-transparent transition-colors";
                conSim.classList.remove('hidden');
                conRes.classList.add('hidden');
            }
        }

        // 沖泡模擬
        function runSimulation() {
            const btn = document.getElementById('btn-sim');
            const bar = document.getElementById('sim-bar');
            const status = document.getElementById('sim-status');
            const pct = document.getElementById('sim-pct');
            const resultArea = document.getElementById('sim-result-area');

            btn.style.display = 'none'; 
            bar.style.width = '0%';
            resultArea.classList.add('hidden');
            resultArea.classList.remove('node-reveal');
            
            let progress = 0;
            status.innerText = "注入 90°C 熱水...";
            
            const interval = setInterval(() => {
                progress += 5;
                bar.style.width = `${progress}%`;
                pct.innerText = `${progress}%`;

                if (progress === 30) status.innerText = "佛手茶葉舒展中 (Timing Loop)...";
                if (progress === 60) {
                    if (currentTeaType === "green") status.innerText = "釋放高活性兒茶素與雪梨清香...";
                    else if (currentTeaType === "dark") status.innerText = "萃取去油解膩之黑茶多酚...";
                    else status.innerText = "釋放疏肝理氣之黃酮類與茶氨酸...";
                }
                if (progress >= 100) {
                    clearInterval(interval);
                    status.innerText = "運算完畢！";
                    // 彈出實體化的生化萃取報告與數位茶湯
                    resultArea.classList.remove('hidden');
                    resultArea.classList.add('node-reveal');
                }
            }, 100);
        }

        // 購物車邏輯
        function addToCart(name, price) {
            const item = cart.find(i => i.name === name);
            if (item) { item.qty += 1; } else { cart.push({ name, price, qty: 1 }); }
            updateCartUI();
            
            const t = document.getElementById('toast');
            document.getElementById('toast-msg').innerText = `已將 ${name} 加入清單！`;
            t.classList.remove('translate-y-20', 'opacity-0'); 
            t.classList.add('translate-y-0', 'opacity-100');
            setTimeout(() => { 
                t.classList.add('translate-y-20', 'opacity-0'); 
                t.classList.remove('translate-y-0', 'opacity-100'); 
            }, 2500);
        }

        function updateCartUI() {
            const container = document.getElementById('cart-items');
            const totalEl = document.getElementById('total-price');
            const countEl = document.getElementById('cart-count');

            if (cart.length === 0) {
                container.innerHTML = `<div class="text-center py-12 text-white/40 text-xs">目前沒有處方解法。請先執行運算思維管線！</div>`;
                countEl.classList.add('hidden');
                totalEl.innerText = "NT$ 0";
                return;
            }

            countEl.innerText = cart.reduce((acc, curr) => acc + curr.qty, 0);
            countEl.classList.remove('hidden');

            let html = ''; let sum = 0;
            cart.forEach((item, idx) => {
                sum += item.price * item.qty;
                html += `
                    <div class="liquid-glass-dark p-3 rounded-xl border border-white/10 flex justify-between items-center shadow-inner">
                        <div class="text-left">
                            <p class="font-bold text-white text-xs drop-shadow-sm">${item.name}</p>
                            <p class="text-tea-gold font-bold text-xs mt-0.5">NT$ ${item.price} × ${item.qty}</p>
                        </div>
                        <button onclick="removeCartItem(${idx})" class="text-red-400 p-2 hover:text-red-300 transition-colors active:scale-90"><i class="fa-regular fa-trash-can"></i></button>
                    </div>
                `;
            });
            container.innerHTML = html; 
            totalEl.innerText = `NT$ ${sum}`;
        }

        function removeCartItem(idx) { cart.splice(idx, 1); updateCartUI(); }

        function toggleCart() {
            document.getElementById('cart-drawer').classList.toggle('translate-x-full');
            document.getElementById('cart-overlay').classList.toggle('opacity-0');
        }

        function checkout() {
            if(cart.length === 0) return alert("清單目前沒有商品哦！");
            alert("結帳成功！感謝您使用莊友佛手茶解題引擎。");
            cart = []; updateCartUI(); toggleCart();
        }
    </script>
</body>
</html>
