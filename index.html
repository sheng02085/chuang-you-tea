<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>莊友佛手茶 | 運算思維視覺化管線</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;700&family=Noto+Sans+TC:wght@300;400;500;700&family=Noto+Serif+TC:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        tea: { dark: '#1C3A27', light: '#EAF3EC', gold: '#D4AF37' }
                    },
                    fontFamily: {
                        sans: ['Noto Sans TC', 'sans-serif'],
                        serif: ['Noto Serif TC', 'serif'],
                        mono: ['Fira Code', 'monospace']
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #F8FAFC;
            background-image: radial-gradient(#CBD5E1 1px, transparent 1px);
            background-size: 24px 24px;
            overflow-x: hidden;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.9);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.07);
        }

        @keyframes popIn {
            0% { opacity: 0; transform: translateY(20px) scale(0.95); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }
        .node-reveal { animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }

        .wire-vertical {
            width: 2px;
            background: linear-gradient(to bottom, #1C3A27 0%, transparent 100%);
            background-size: 100% 200%;
            animation: flowDown 1.5s infinite linear;
        }
        @keyframes flowDown { 0% { background-position: 0% -100%; } 100% { background-position: 0% 100%; } }

        /* 蒸汽上升動畫 */
        @keyframes steam-rise {
            0% { opacity: 0; transform: translateY(5px) scale(0.8); }
            50% { opacity: 0.8; transform: translateY(-10px) scale(1.1); }
            100% { opacity: 0; transform: translateY(-20px) scale(1.2); }
        }
        .animate-steam { animation: steam-rise 2s infinite ease-in-out; }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #CBD5E1; border-radius: 10px; }
    </style>
</head>
<body class="text-slate-800 antialiased min-h-screen flex flex-col">

    <header class="fixed top-0 w-full z-40 glass-card border-b border-white/50 px-6 py-3 flex justify-between items-center">
        <div class="flex items-center gap-3">
            <div class="w-8 h-8 rounded-lg bg-tea-dark text-white flex items-center justify-center font-serif font-bold text-sm">莊</div>
            <div>
                <h1 class="font-bold text-tea-dark tracking-widest text-sm">莊友佛手茶</h1>
                <p class="text-[9px] font-mono text-slate-500">Visual Problem-Solving Pipeline</p>
            </div>
        </div>
        <div class="flex items-center gap-4">
            <div class="hidden sm:flex text-[10px] font-mono text-slate-500 bg-white/50 px-3 py-1.5 rounded-full border border-slate-200 items-center gap-2">
                <span class="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse"></span>
                CT_ENGINE: ONLINE
            </div>
            <button onclick="toggleCart()" class="relative p-2 text-tea-dark hover:text-tea-gold transition-colors active:scale-95">
                <i class="fa-solid fa-bag-shopping text-xl"></i>
                <span id="cart-count" class="absolute top-0 right-0 bg-tea-gold text-white text-[10px] font-bold w-4 h-4 rounded-full flex items-center justify-center hidden">0</span>
            </button>
        </div>
    </header>

    <main class="flex-1 pt-24 pb-12 px-4 max-w-4xl mx-auto w-full relative z-10 flex flex-col items-center">
        
        <div class="w-full glass-card rounded-3xl p-6 sm:p-8 relative z-20 space-y-6 shadow-xl">
            <div class="text-center space-y-2">
                <div class="inline-flex items-center justify-center w-12 h-12 rounded-full bg-tea-light text-tea-dark mb-1">
                    <i class="fa-solid fa-sliders text-xl"></i>
                </div>
                <h2 class="font-serif text-2xl sm:text-3xl font-bold text-tea-dark">定義你的生活問題</h2>
                <p class="text-xs text-slate-500 font-light max-w-lg mx-auto">
                    請輸入日常不適，並透過特製的液態滑桿量化您的生理變數。系統將依據佛手茶真實的黃酮類與理氣特性，推導出最佳解法。
                </p>
            </div>
            
            <div class="max-w-2xl mx-auto grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="space-y-2">
                    <label class="text-xs font-bold text-tea-dark font-mono"><i class="fa-solid fa-keyboard mr-1"></i>String Input (問題描述)</label>
                    <textarea id="complaint-input" rows="5" class="w-full bg-white/60 border border-slate-300 rounded-xl p-3 text-sm focus:border-tea-dark outline-none transition-all resize-none shadow-inner" placeholder="例如：期末考熬夜寫程式，大腦很卡... / 剛吃完烤肉大餐，胃很脹不舒服..."></textarea>
                </div>

                <div class="space-y-4 bg-slate-50/50 p-4 rounded-xl border border-slate-200 shadow-inner flex flex-col justify-center">
                    <label class="text-xs font-bold text-tea-dark font-mono"><i class="fa-solid fa-flask-vial mr-1"></i>Decomposition (特徵變數擷取管)</label>
                    
                    <div class="space-y-1 relative">
                        <div class="flex justify-between text-[10px] text-slate-600 font-bold mb-1">
                            <span>😤 情緒緊繃度 (Stress)</span>
                        </div>
                        <div class="relative w-full h-7 bg-slate-200 rounded-full shadow-inner overflow-hidden border border-slate-300">
                            <div id="fill-stress" class="absolute top-0 left-0 h-full bg-amber-500 transition-all duration-75 pointer-events-none" style="width: 50%;"></div>
                            <input type="range" id="slider-stress" min="0" max="100" value="50" class="absolute top-0 left-0 w-full h-full opacity-0 cursor-pointer z-10" oninput="updateFluidSlider('stress', this.value)">
                            <div class="absolute inset-y-0 right-3 flex items-center pointer-events-none z-20">
                                <span id="val-stress" class="font-mono font-bold text-xs text-white mix-blend-difference drop-shadow-md">50%</span>
                            </div>
                        </div>
                    </div>

                    <div class="space-y-1 relative">
                        <div class="flex justify-between text-[10px] text-slate-600 font-bold mb-1">
                            <span>🥑 腸胃脹滿度 (Digestion)</span>
                        </div>
                        <div class="relative w-full h-7 bg-slate-200 rounded-full shadow-inner overflow-hidden border border-slate-300">
                            <div id="fill-digest" class="absolute top-0 left-0 h-full bg-emerald-600 transition-all duration-75 pointer-events-none" style="width: 50%;"></div>
                            <input type="range" id="slider-digest" min="0" max="100" value="50" class="absolute top-0 left-0 w-full h-full opacity-0 cursor-pointer z-10" oninput="updateFluidSlider('digest', this.value)">
                            <div class="absolute inset-y-0 right-3 flex items-center pointer-events-none z-20">
                                <span id="val-digest" class="font-mono font-bold text-xs text-white mix-blend-difference drop-shadow-md">50%</span>
                            </div>
                        </div>
                    </div>

                    <div class="space-y-1 relative">
                        <div class="flex justify-between text-[10px] text-slate-600 font-bold mb-1">
                            <span>🧠 疲勞腦霧度 (Fatigue)</span>
                        </div>
                        <div class="relative w-full h-7 bg-slate-200 rounded-full shadow-inner overflow-hidden border border-slate-300">
                            <div id="fill-cog" class="absolute top-0 left-0 h-full bg-blue-500 transition-all duration-75 pointer-events-none" style="width: 50%;"></div>
                            <input type="range" id="slider-cog" min="0" max="100" value="50" class="absolute top-0 left-0 w-full h-full opacity-0 cursor-pointer z-10" oninput="updateFluidSlider('cog', this.value)">
                            <div class="absolute inset-y-0 right-3 flex items-center pointer-events-none z-20">
                                <span id="val-cog" class="font-mono font-bold text-xs text-white mix-blend-difference drop-shadow-md">50%</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="text-center pt-2">
                <button onclick="startPipeline()" id="btn-start" class="bg-tea-dark hover:bg-emerald-900 text-white font-bold text-sm px-8 py-3 rounded-xl shadow-lg transition-transform active:scale-95 inline-flex items-center gap-2">
                    <i class="fa-solid fa-play"></i> 執行運算思維管線
                </button>
            </div>
        </div>

        <div id="pipeline-container" class="w-full mt-2 flex flex-col items-center pb-20"></div>

    </main>

    <button onclick="location.reload()" class="fixed bottom-6 right-6 w-12 h-12 bg-white rounded-full shadow-xl border border-slate-200 text-slate-400 hover:text-tea-dark flex items-center justify-center transition-all active:scale-90 z-40">
        <i class="fa-solid fa-rotate-right"></i>
    </button>

    <div id="cart-drawer" class="fixed inset-0 z-50 overflow-hidden pointer-events-none transition-all duration-300 translate-x-full">
        <div class="absolute inset-0 bg-slate-900/40 opacity-0 transition-opacity duration-300" onclick="toggleCart()" id="cart-overlay"></div>
        <div class="absolute inset-y-0 right-0 max-w-sm w-full bg-white shadow-2xl flex flex-col justify-between pointer-events-auto border-l border-slate-200">
            <div class="p-6 border-b border-slate-200 flex justify-between items-center bg-slate-50">
                <h3 class="text-md font-bold text-tea-dark flex items-center gap-2">
                    <i class="fa-solid fa-bag-shopping"></i><span>採購物資庫</span>
                </h3>
                <button onclick="toggleCart()" class="text-slate-400 hover:text-tea-dark transition-colors active:scale-90">
                    <i class="fa-solid fa-xmark text-xl"></i>
                </button>
            </div>
            <div id="cart-items" class="flex-1 overflow-y-auto p-6 space-y-3 bg-slate-50/50">
                <div class="text-center py-12 text-slate-400 text-xs">
                    目前沒有處方解法。請先執行運算思維管線！
                </div>
            </div>
            <div class="p-6 border-t border-slate-200 bg-white space-y-4">
                <div class="flex justify-between items-end">
                    <span class="text-xs font-bold text-slate-500">應付總額 (滿$499免運)</span>
                    <span id="total-price" class="text-xl font-extrabold text-tea-dark">NT$ 0</span>
                </div>
                <button onclick="checkout()" class="w-full bg-tea-dark hover:bg-emerald-900 text-white font-bold py-3.5 rounded-xl shadow transition-transform active:scale-95 text-sm flex items-center justify-center gap-2">
                    <i class="fa-solid fa-credit-card"></i> 結帳採購
                </button>
            </div>
        </div>
    </div>

    <div id="toast" class="fixed bottom-6 left-1/2 -translate-x-1/2 z-50 bg-tea-dark text-white py-3 px-6 rounded-full text-xs font-medium shadow-2xl transition-all duration-300 transform translate-y-20 opacity-0 pointer-events-none flex items-center gap-2">
        <i class="fa-solid fa-circle-check text-tea-gold"></i>
        <span id="toast-msg">加入成功！</span>
    </div>

    <script>
        let cart = [];
        let currentTeaType = "";

        // 更新特殊液態滑桿的UI
        function updateFluidSlider(id, val) {
            document.getElementById(`val-${id}`).innerText = val + '%';
            document.getElementById(`fill-${id}`).style.width = val + '%';
        }

        function startPipeline() {
            const inputTxt = document.getElementById('complaint-input').value.toLowerCase();
            const valStress = parseInt(document.getElementById('slider-stress').value);
            const valDigest = parseInt(document.getElementById('slider-digest').value);
            const valCog = parseInt(document.getElementById('slider-cog').value);

            if (!inputTxt && valStress === 50 && valDigest === 50 && valCog === 50) {
                alert("請輸入一些抱怨文字或調整滑桿數據，系統才能進行特徵擷取！");
                return;
            }

            const container = document.getElementById('pipeline-container');
            container.innerHTML = '';
            document.getElementById('btn-start').innerHTML = '<i class="fa-solid fa-spinner animate-spin"></i> 運算中...';
            document.getElementById('btn-start').classList.add('opacity-70', 'cursor-not-allowed');

            let scoreStress = valStress + (inputTxt.includes('壓力') || inputTxt.includes('焦慮') || inputTxt.includes('緊繃') || inputTxt.includes('煩') ? 50 : 0);
            let scoreDigest = valDigest + (inputTxt.includes('油') || inputTxt.includes('脹') || inputTxt.includes('飽') || inputTxt.includes('大餐') ? 50 : 0);
            let scoreCog = valCog + (inputTxt.includes('code') || inputTxt.includes('昏') || inputTxt.includes('累') || inputTxt.includes('熬夜') ? 50 : 0);

            let decompKw = `[緊繃:${valStress}%, 脹滿:${valDigest}%, 腦霧:${valCog}%]`;
            let patMatch, absFilter, algoTitle, algoDesc, price;
            
            if (scoreStress >= scoreDigest && scoreStress >= scoreCog) {
                currentTeaType = "red";
                patMatch = "模式匹配：需「疏肝理氣」➜ 佛手茶特有高含量黃酮類化合物";
                absFilter = "濾除環境雜訊 ➜ 提取「舒壓解鬱、平復神經」核心解法";
                algoTitle = "莊友頂級佛手紅茶包 (20入)";
                algoDesc = "佛手茶自古以「理氣解鬱」聞名。我們採用全發酵製程轉化出優雅的柑橘熟果蜜香，內含的高含量黃酮類能有效疏解肝氣鬱結，為您撫平緊繃情緒。";
                price = 280;
            } else if (scoreDigest >= scoreStress && scoreDigest >= scoreCog) {
                currentTeaType = "dark";
                patMatch = "模式匹配：需「和胃止痛」➜ 黑茶多酚與佛手揮發油成分";
                absFilter = "濾除食物種類雜訊 ➜ 提取「消食化膩、解除脹滿」核心解法";
                algoTitle = "莊友陳年炭焙佛手黑茶包 (20入)";
                algoDesc = "《本草綱目》記載佛手具健脾和胃之效。結合老手藝深層炭焙與後發酵，茶湯濃厚甘甜。其豐富的黑茶多酚能加速分解脂肪，是吃完大餐後消除脹滿的最強處方！";
                price = 300;
            } else {
                currentTeaType = "green";
                patMatch = "模式匹配：需「提神益思」➜ 香櫞青茶未發酵之天然兒茶素";
                absFilter = "濾除外在事件雜訊 ➜ 提取「驅散昏沉、激發大腦」核心解法";
                algoTitle = "莊友經典佛手青茶包 (20入)";
                algoDesc = "輕發酵製程完整鎖住竹山佛手茶特有的優雅雪梨蘭花清香。保留了最高活性的茶多酚與適量咖啡因，能以最溫和的方式驅散大腦當機，助您重回高效心流。";
                price = 250;
            }

            const nodes = [
                {
                    step: "STEP 1: DECOMPOSITION (拆解)", icon: "fa-solid fa-layer-group text-blue-500", title: "量化身心抱怨矩陣",
                    content: `<div class="bg-slate-100 font-mono text-xs p-2 rounded border border-slate-200 mt-2 text-slate-600">提取量化變數向量：<br><span class="text-blue-600 font-bold">${decompKw}</span></div>`
                },
                {
                    step: "STEP 2: PATTERN RECOGNITION (模式識別)", icon: "fa-solid fa-fingerprint text-purple-500", title: "比對真實佛手茶生化庫",
                    content: `<div class="bg-slate-100 font-mono text-xs p-2 rounded border border-slate-200 mt-2 text-slate-600"><span class="text-purple-600 font-bold">${patMatch}</span></div>`
                },
                {
                    step: "STEP 3: ABSTRACTION (抽象化)", icon: "fa-solid fa-filter text-orange-500", title: "排除無關環境雜訊",
                    content: `<div class="bg-slate-100 font-mono text-xs p-2 rounded border border-slate-200 mt-2 text-slate-600"><span class="text-orange-600 font-bold">${absFilter}</span></div>`
                },
                {
                    step: "STEP 4: ALGORITHM (演算法輸出)", icon: "fa-solid fa-check-double text-emerald-600", title: "莊友佛手茶最佳解法導出",
                    content: `
                        <div class="mt-4 bg-white border border-slate-200 rounded-2xl shadow-lg overflow-hidden text-left relative z-20">
                            <div class="flex border-b border-slate-200 bg-slate-50 font-mono text-[10px] sm:text-xs">
                                <button onclick="switchTab('result')" id="tab-result" class="flex-1 py-2 font-bold text-tea-dark border-b-2 border-tea-dark transition-colors"><i class="fa-solid fa-box-open mr-1"></i>處方結論</button>
                                <button onclick="switchTab('sim')" id="tab-sim" class="flex-1 py-2 text-slate-400 hover:text-tea-dark border-b-2 border-transparent transition-colors"><i class="fa-solid fa-flask text-xs mr-1"></i>沖泡演算法模擬</button>
                            </div>
                            
                            <div id="content-result" class="p-5 bg-gradient-to-br from-tea-light to-white">
                                <span class="text-[9px] font-mono bg-tea-dark text-white px-2 py-1 rounded">Optimal Choice</span>
                                <h3 class="font-serif font-bold text-xl mt-2 text-tea-dark">${algoTitle}</h3>
                                <p class="text-xs text-slate-600 mt-2 leading-relaxed">${algoDesc}</p>
                                <div class="mt-4 flex justify-between items-center border-t border-slate-200 pt-3">
                                    <span class="font-mono font-bold text-lg text-tea-dark">NT$ ${price}</span>
                                    <button class="bg-tea-dark text-white text-xs font-bold px-4 py-2 rounded-lg shadow hover:bg-emerald-900 transition-transform active:scale-95 flex items-center gap-1.5" onclick="addToCart('${algoTitle}', ${price})">
                                        <i class="fa-solid fa-cart-plus"></i> 一鍵採購解法
                                    </button>
                                </div>
                            </div>

                            <div id="content-sim" class="hidden p-5 bg-slate-800 text-white font-mono text-xs">
                                <p class="text-emerald-400 mb-3"><i class="fa-solid fa-terminal mr-1"></i>執行佛手茶萃取演算法 (Extraction Loop)</p>
                                <div class="space-y-2 text-[10px] text-slate-300">
                                    <p>1. 初始化參數: <span class="text-yellow-400">Temp = 90°C</span>, <span class="text-blue-400">Water = 300ml</span></p>
                                    <p>2. 載入物件: <span class="text-white">莊友立體原葉茶包</span></p>
                                </div>
                                <div class="mt-4 space-y-2">
                                    <div class="flex justify-between text-[10px]">
                                        <span id="sim-status">等待指令...</span>
                                        <span id="sim-pct">0%</span>
                                    </div>
                                    <div class="w-full bg-slate-700 h-2 rounded-full overflow-hidden">
                                        <div id="sim-bar" class="bg-emerald-500 h-2 w-0 transition-all duration-300"></div>
                                    </div>
                                </div>
                                <button onclick="runSimulation()" id="btn-sim" class="w-full mt-4 bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-2 rounded text-[10px] uppercase tracking-widest active:scale-95 transition-transform">
                                    <i class="fa-solid fa-play mr-1"></i> RUN_EXTRACTION()
                                </button>

                                <div id="sim-result-area" class="hidden mt-4 bg-slate-900 border border-emerald-500/30 rounded-xl p-4 text-center">
                                    <div class="relative inline-block mt-2">
                                        <div class="absolute -top-6 left-1/2 -translate-x-1/2 text-white/40 text-3xl animate-steam">♨️</div>
                                        <div class="text-5xl drop-shadow-[0_0_15px_rgba(16,185,129,0.5)]">🍵</div>
                                    </div>
                                    <h4 class="text-emerald-400 font-bold mt-3 text-sm tracking-widest">數位茶湯萃取完成</h4>
                                    <div class="grid grid-cols-2 gap-2 mt-3 text-[9px] text-slate-300">
                                        <div class="bg-slate-800 p-2 rounded border border-slate-700">有效生化萃取率: <span class="text-emerald-400 font-bold text-[10px] block mt-1">98.5%</span></div>
                                        <div class="bg-slate-800 p-2 rounded border border-slate-700">多酚黃酮活性: <span class="text-emerald-400 font-bold text-[10px] block mt-1">OPTIMAL</span></div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    `
                }
            ];

            nodes.forEach((node, index) => {
                setTimeout(() => {
                    if (index > 0) {
                        const wire = document.createElement('div');
                        wire.className = "h-8 sm:h-12 flex justify-center node-reveal";
                        wire.innerHTML = `<div class="wire-vertical"></div>`;
                        container.appendChild(wire);
                    }

                    const card = document.createElement('div');
                    card.className = "w-full max-w-xl glass-card rounded-2xl p-5 text-center node-reveal border border-white relative z-10";
                    card.innerHTML = `
                        <div class="text-[10px] font-mono font-bold text-slate-400 tracking-widest uppercase mb-1">${node.step}</div>
                        <div class="flex items-center justify-center gap-2 mb-2">
                            <i class="${node.icon} text-lg"></i>
                            <h3 class="font-bold text-slate-800 text-sm">${node.title}</h3>
                        </div>
                        ${node.content}
                    `;
                    container.appendChild(card);
                    window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });

                    if (index === 3) {
                        document.getElementById('btn-start').innerHTML = '<i class="fa-solid fa-rotate-right"></i> 重新執行管線';
                        document.getElementById('btn-start').classList.remove('opacity-70', 'cursor-not-allowed');
                    }
                }, index * 1000); 
            });
        }

        function switchTab(tabName) {
            const tabRes = document.getElementById('tab-result');
            const tabSim = document.getElementById('tab-sim');
            const conRes = document.getElementById('content-result');
            const conSim = document.getElementById('content-sim');

            if (tabName === 'result') {
                tabRes.className = "flex-1 py-2 font-bold text-tea-dark border-b-2 border-tea-dark transition-colors";
                tabSim.className = "flex-1 py-2 text-slate-400 hover:text-tea-dark border-b-2 border-transparent transition-colors";
                conRes.classList.remove('hidden');
                conSim.classList.add('hidden');
            } else {
                tabSim.className = "flex-1 py-2 font-bold text-tea-dark border-b-2 border-tea-dark transition-colors";
                tabRes.className = "flex-1 py-2 text-slate-400 hover:text-tea-dark border-b-2 border-transparent transition-colors";
                conSim.classList.remove('hidden');
                conRes.classList.add('hidden');
            }
        }

        // 修改：加上動畫與產出結果的萃取演算法
        function runSimulation() {
            const btn = document.getElementById('btn-sim');
            const bar = document.getElementById('sim-bar');
            const status = document.getElementById('sim-status');
            const pct = document.getElementById('sim-pct');
            const resultArea = document.getElementById('sim-result-area');

            btn.style.display = 'none'; // 隱藏執行按鈕
            bar.style.width = '0%';
            resultArea.classList.add('hidden');
            
            let progress = 0;
            status.innerText = "注入 90°C 熱水...";
            
            const interval = setInterval(() => {
                progress += 5;
                bar.style.width = `${progress}%`;
                pct.innerText = `${progress}%`;

                if (progress === 30) status.innerText = "佛手茶葉舒展中 (Timing Loop)...";
                if (progress === 60) {
                    if (currentTeaType === "green") status.innerText = "釋放高活性兒茶素與雪梨清香...";
                    else if (currentTeaType === "dark") status.innerText = "萃取去油解膩之黑茶多酚...";
                    else status.innerText = "釋放疏肝理氣之黃酮類與茶氨酸...";
                }
                if (progress >= 100) {
                    clearInterval(interval);
                    status.innerText = "運算完畢！";
                    // 彈出實體化的生化萃取報告與數位茶湯
                    resultArea.classList.remove('hidden');
                    resultArea.classList.add('node-reveal');
                }
            }, 100);
        }

        function addToCart(name, price) {
            const item = cart.find(i => i.name === name);
            if (item) { item.qty += 1; } else { cart.push({ name, price, qty: 1 }); }
            updateCartUI();
            
            const t = document.getElementById('toast');
            document.getElementById('toast-msg').innerText = `已將 ${name} 加入清單！`;
            t.classList.remove('translate-y-20', 'opacity-0'); 
            t.classList.add('translate-y-0', 'opacity-100');
            setTimeout(() => { 
                t.classList.add('translate-y-20', 'opacity-0'); 
                t.classList.remove('translate-y-0', 'opacity-100'); 
            }, 2500);
        }

        function updateCartUI() {
            const container = document.getElementById('cart-items');
            const totalEl = document.getElementById('total-price');
            const countEl = document.getElementById('cart-count');

            if (cart.length === 0) {
                container.innerHTML = `<div class="text-center py-12 text-slate-400 text-xs">目前沒有處方解法。請先執行運算思維管線！</div>`;
                countEl.classList.add('hidden');
                totalEl.innerText = "NT$ 0";
                return;
            }

            countEl.innerText = cart.reduce((acc, curr) => acc + curr.qty, 0);
            countEl.classList.remove('hidden');

            let html = ''; let sum = 0;
            cart.forEach((item, idx) => {
                sum += item.price * item.qty;
                html += `
                    <div class="bg-white p-3 rounded-xl border border-slate-200 flex justify-between items-center shadow-sm">
                        <div class="text-left">
                            <p class="font-bold text-tea-dark text-xs">${item.name}</p>
                            <p class="text-tea-gold font-bold text-xs">NT$ ${item.price} × ${item.qty}</p>
                        </div>
                        <button onclick="removeCartItem(${idx})" class="text-red-400 p-1 hover:text-red-600 transition-colors active:scale-90"><i class="fa-regular fa-trash-can"></i></button>
                    </div>
                `;
            });
            container.innerHTML = html; 
            totalEl.innerText = `NT$ ${sum}`;
        }

        function removeCartItem(idx) { cart.splice(idx, 1); updateCartUI(); }
        function toggleCart() {
            document.getElementById('cart-drawer').classList.toggle('translate-x-full');
            document.getElementById('cart-overlay').classList.toggle('opacity-0');
        }
        function checkout() {
            if(cart.length === 0) return alert("清單目前沒有商品哦！");
            alert("結帳成功！感謝您選購莊友佛手茶。");
            cart = []; updateCartUI(); toggleCart();
        }
    </script>
</body>
</html>
