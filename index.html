<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>莊友佛手茶 | 運算思維視覺化管線</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Noto+Sans+TC:wght@300;400;500;700&family=Noto+Serif+TC:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        tea: {
                            dark: '#1C3A27',
                            light: '#EAF3EC',
                            gold: '#D4AF37',
                            card: 'rgba(255, 255, 255, 0.85)',
                        }
                    },
                    fontFamily: {
                        sans: ['Noto Sans TC', 'sans-serif'],
                        serif: ['Noto Serif TC', 'serif'],
                        mono: ['Fira Code', 'monospace']
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #F8FAFC;
            /* 網點畫布背景，營造思考工作區的感覺 */
            background-image: radial-gradient(#CBD5E1 1px, transparent 1px);
            background-size: 24px 24px;
            overflow-x: hidden;
        }

        /* 玻璃擬物化 (Glassmorphism) 卡片 */
        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.07);
        }

        /* 節點進場動畫 */
        @keyframes popIn {
            0% { opacity: 0; transform: translateY(20px) scale(0.95); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }
        .node-reveal {
            animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        /* 節點間的動態連線軌跡 */
        .wire-vertical {
            width: 2px;
            background: linear-gradient(to bottom, #1C3A27 0%, transparent 100%);
            background-size: 100% 200%;
            animation: flowDown 1.5s infinite linear;
        }
        @keyframes flowDown {
            0% { background-position: 0% -100%; }
            100% { background-position: 0% 100%; }
        }

        /* 隱藏捲軸但可滾動 */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #CBD5E1; border-radius: 10px; }
    </style>
</head>
<body class="text-slate-800 antialiased min-h-screen flex flex-col">

    <header class="fixed top-0 w-full z-50 glass-card border-b border-white/50 px-6 py-3 flex justify-between items-center">
        <div class="flex items-center gap-3">
            <div class="w-8 h-8 rounded-lg bg-tea-dark text-white flex items-center justify-center font-serif font-bold text-sm">莊</div>
            <div>
                <h1 class="font-bold text-tea-dark tracking-widest text-sm">莊友佛手茶</h1>
                <p class="text-[9px] font-mono text-slate-500">Visual Problem-Solving Pipeline</p>
            </div>
        </div>
        <div class="text-[10px] font-mono text-slate-500 bg-white/50 px-3 py-1.5 rounded-full border border-slate-200 flex items-center gap-2">
            <span class="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse"></span>
            CT_ENGINE: ONLINE
        </div>
    </header>

    <main class="flex-1 pt-24 pb-12 px-4 max-w-4xl mx-auto w-full relative z-10 flex flex-col items-center">
        
        <div class="w-full glass-card rounded-3xl p-6 sm:p-8 relative z-20 text-center space-y-5">
            <div class="inline-flex items-center justify-center w-12 h-12 rounded-full bg-tea-light text-tea-dark mb-2">
                <i class="fa-solid fa-seedling text-xl"></i>
            </div>
            <h2 class="font-serif text-2xl sm:text-3xl font-bold text-tea-dark">請輸入生活中的模糊問題</h2>
            <p class="text-xs text-slate-500 font-light max-w-lg mx-auto">
                無需自行挑選茶葉。請將您當下的疲勞、壓力、或飲食不適輸入畫布，系統將執行運算思維四大節點，為您推導出莊友佛手茶的最佳解法。
            </p>
            
            <div class="relative max-w-2xl mx-auto mt-4">
                <textarea id="complaint-input" rows="3" class="w-full bg-white/60 border-2 border-slate-200 rounded-2xl p-4 text-sm focus:border-tea-dark focus:ring-4 focus:ring-tea-light outline-none transition-all resize-none shadow-inner" placeholder="例如：期末考熬夜寫程式，大腦很卡快瘋了... / 宵夜不小心吃太多炸物，肚子好脹..."></textarea>
                
                <button onclick="startPipeline()" class="absolute bottom-3 right-3 bg-tea-dark hover:bg-emerald-900 text-white font-bold text-xs px-5 py-2.5 rounded-xl shadow-lg transition-transform active:scale-95 flex items-center gap-2">
                    <i class="fa-solid fa-play"></i> 執行管線
                </button>
            </div>
        </div>

        <div id="pipeline-container" class="w-full mt-2 flex flex-col items-center pb-20">
            </div>

    </main>

    <button onclick="location.reload()" class="fixed bottom-6 right-6 w-12 h-12 bg-white rounded-full shadow-xl border border-slate-200 text-slate-400 hover:text-tea-dark flex items-center justify-center transition-all active:scale-90 z-50">
        <i class="fa-solid fa-rotate-right"></i>
    </button>

    <script>
        // 運算思維：核心管線生成演算法
        function startPipeline() {
            const input = document.getElementById('complaint-input').value.trim();
            if (!input) {
                alert("請先輸入您的生活問題，才能啟動運算管線！");
                return;
            }

            const container = document.getElementById('pipeline-container');
            container.innerHTML = ''; // 清空畫布

            // 將按鈕與輸入框暫時鎖定
            document.getElementById('complaint-input').disabled = true;

            const msg = input.toLowerCase();
            let strategy = "relax"; // 預設策略
            let decompKw = ""; let patMatch = ""; let absFilter = ""; let algoTitle = ""; let algoDesc = ""; let price = "";

            // 運算思維邏輯判斷
            if (msg.includes('code') || msg.includes('累') || msg.includes('熬夜') || msg.includes('昏') || msg.includes('讀書') || msg.includes('考試') || msg.includes('卡關')) {
                strategy = "alert";
                decompKw = "['熬夜', '高認知負荷', '腦霧卡關']";
                patMatch = "匹配目標：需要溫和激活神經元 ➜ 香櫞青茶多酚類化合物";
                absFilter = "濾除物理雜訊 ➜ 提取「提神不傷胃」單一維度需求";
                algoTitle = "莊友經典佛手青茶包";
                algoDesc = "輕發酵製程完整鎖住竹山照鏡山特有的優雅雪梨蘭花清香。高活性的兒茶素能以最溫和的方式驅散思考霧氣，助您重回高效專注的心流！";
                price = "NT$ 250";
            } else if (msg.includes('油') || msg.includes('飽') || msg.includes('脹') || msg.includes('大餐') || msg.includes('肉') || msg.includes('宵夜') || msg.includes('吃太多')) {
                strategy = "digest";
                decompKw = "['高脂飲食', '消化道超載', '飽脹']";
                patMatch = "匹配目標：需要加速脂肪乳化 ➜ 黑茶多酚與茶紅素";
                absFilter = "濾除食物種類雜訊 ➜ 提取「強效去油解膩」單一維度需求";
                algoTitle = "莊友陳年炭焙佛手黑茶包";
                algoDesc = "傳承老手藝深層炭焙與慢速後發酵，茶湯濃厚帶有自然仙草蜜甜。高濃度黑茶素能極速瓦解胃部的油膩飽脹感，是吃完大餐後的最強去油處方！";
                price = "NT$ 300";
            } else {
                strategy = "relax";
                decompKw = "['壓力大', '皮質醇緊繃', '情緒焦慮']";
                patMatch = "匹配目標：需要誘導大腦α波 ➜ 高濃度天然茶氨酸 (L-Theanine)";
                absFilter = "濾除外在事件雜訊 ➜ 提取「深層安定舒眠」單一維度需求";
                algoTitle = "莊友頂級佛手紅茶包";
                algoDesc = "完全發酵製程轉化出優雅的柑橘熟果蜜香，茶性溫潤。蘊含的大量溫和茶氨酸能迅速撫平緊繃了一整天的焦慮神經，帶給身心最深度的安定感。";
                price = "NT$ 280";
            }

            // 依序渲染四個運算思維節點
            const nodes = [
                {
                    step: "STEP 1: DECOMPOSITION (拆解)",
                    icon: "fa-solid fa-cubes-stacked text-blue-500",
                    title: "解構模糊問題",
                    content: `<div class="bg-blue-50 text-blue-700 font-mono text-xs p-2 rounded border border-blue-200 mt-2">擷取核心向量：${decompKw}</div>`
                },
                {
                    step: "STEP 2: PATTERN RECOGNITION (模式識別)",
                    icon: "fa-solid fa-fingerprint text-purple-500",
                    title: "比對茶葉生化資料庫",
                    content: `<div class="bg-purple-50 text-purple-700 font-mono text-xs p-2 rounded border border-purple-200 mt-2">${patMatch}</div>`
                },
                {
                    step: "STEP 3: ABSTRACTION (抽象化)",
                    icon: "fa-solid fa-filter text-orange-500",
                    title: "排除無關雜訊",
                    content: `<div class="bg-orange-50 text-orange-700 font-mono text-xs p-2 rounded border border-orange-200 mt-2">${absFilter}</div>`
                },
                {
                    step: "STEP 4: ALGORITHM (演算法輸出解法)",
                    icon: "fa-solid fa-check-double text-emerald-600",
                    title: "最佳莊友佛手茶解法導出",
                    content: `
                        <div class="mt-4 p-4 bg-gradient-to-br from-tea-dark to-emerald-900 rounded-2xl text-white text-left shadow-xl relative overflow-hidden">
                            <div class="absolute right-[-20px] top-[-20px] opacity-10 text-9xl"><i class="fa-solid fa-leaf"></i></div>
                            <span class="text-[10px] font-mono bg-tea-gold/20 text-tea-gold px-2 py-1 rounded">Optimal Solution</span>
                            <h3 class="font-serif font-bold text-xl mt-2 text-tea-gold">${algoTitle}</h3>
                            <p class="text-xs text-slate-200 mt-2 leading-relaxed font-light">${algoDesc}</p>
                            <div class="mt-4 flex justify-between items-center border-t border-white/20 pt-3">
                                <span class="font-mono font-bold text-lg text-white">${price}</span>
                                <button class="bg-white text-tea-dark text-xs font-bold px-4 py-2 rounded-lg shadow hover:bg-slate-100 transition-colors" onclick="alert('已加入採購物資庫！')">
                                    採購此解法 <i class="fa-solid fa-arrow-right ml-1"></i>
                                </button>
                            </div>
                        </div>
                    `
                }
            ];

            // 動態定時注入 HTML 以產生流水線動畫感
            nodes.forEach((node, index) => {
                setTimeout(() => {
                    // 1. 繪製連接線 (除了第一個節點)
                    if (index > 0) {
                        const wire = document.createElement('div');
                        wire.className = "h-8 sm:h-12 flex justify-center node-reveal";
                        wire.innerHTML = `<div class="wire-vertical"></div>`;
                        container.appendChild(wire);
                    }

                    // 2. 繪製卡片節點
                    const card = document.createElement('div');
                    card.className = "w-full max-w-xl glass-card rounded-2xl p-5 sm:p-6 text-center node-reveal relative z-10 border border-white";
                    card.innerHTML = `
                        <div class="text-[9px] sm:text-[10px] font-mono font-bold text-slate-400 tracking-widest uppercase mb-1">${node.step}</div>
                        <div class="flex items-center justify-center gap-2 mb-2">
                            <i class="${node.icon} text-lg"></i>
                            <h3 class="font-bold text-slate-800 text-sm sm:text-base">${node.title}</h3>
                        </div>
                        ${node.content}
                    `;
                    container.appendChild(card);
                    
                    // 自動向下滾動，保持最新節點在畫面上
                    window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });

                }, index * 1000); // 每個節點間隔 1 秒浮現
            });
        }
    </script>
</body>
</html>
